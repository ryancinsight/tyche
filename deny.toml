[graph]
all-features = true

[advisories]
yanked = "deny"

[licenses]
confidence-threshold = 0.9
allow = [
    "Apache-2.0",
    "MIT",
    "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/ryancinsight/Moirai.git",
    "https://github.com/ryancinsight/consus.git",
    "https://github.com/ryancinsight/eunomia.git",
]
